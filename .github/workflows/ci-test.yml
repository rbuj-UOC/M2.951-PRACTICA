name: CI test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          packages: |
            any::car
            any::corrplot
            any::dplyr
            any::ggplot2
            any::gridExtra
            any::kableExtra
            any::knitr
            any::lubridate
            any::readr
            any::readxl
            any::rmarkdown
            any::sf
            any::tidyr
            any::VIM

      - name: Render report
        run: |
          mkdir -p public
          Rscript -e "rmarkdown::render('informe.Rmd', output_file='informe.html', output_format='html_document')"
